services:
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - php
      - mercure
      - s3
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

      - ./server/public:/var/www/app/public:ro

      - ./client/dist:/usr/share/nginx/html:ro

      - nginx_logs:/var/log/nginx
    networks: [app-network]

  php:
    build:
      context: ./docker/php
      args:
        INSTALL_XDEBUG: "${INSTALL_XDEBUG:-0}"
    restart: unless-stopped
    working_dir: /var/www/app
    env_file:
      - ./server/.env
    depends_on:
      postgres:
        condition: service_healthy
      mercure:
        condition: service_started
      s3:
        condition: service_started
    environment:
      COMPOSER_HOME: /tmp/composer
    volumes:
      - ./server:/var/www/app
      - symfony_var:/var/www/app/var
      - symfony_vendor:/var/www/app/vendor
      - composer_cache:/tmp/composer

      - ./docker/php/conf/x-php.ini:/usr/local/etc/php/conf.d/custom-docker-php.ini:ro
    networks: [app-network]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-development}"
      POSTGRES_USER: "${POSTGRES_USER:-app}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-app}"
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-54328}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-development}"]
      interval: 2s
      timeout: 3s
      retries: 30
    networks: [app-network]

  mercure:
    image: dunglas/mercure
    restart: unless-stopped
    environment:
      SERVER_NAME: ":80"
      MERCURE_PUBLISHER_JWT_KEY: "${MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}"
      MERCURE_SUBSCRIBER_JWT_KEY: "${MERCURE_JWT_SECRET:-!ChangeThisMercureHubJWTSecretKey!}"
      MERCURE_EXTRA_DIRECTIVES: "${MERCURE_EXTRA_DIRECTIVES:-anonymous\ncors_origins *\n}"
    networks: [app-network]

  s3:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-admin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-supersecretpassword}"
    command: server /data --console-address ":9001"
    volumes:
      - s3_data:/data
    networks: [app-network]

  s3-init:
    profiles: ["init"]
    image: minio/mc:latest
    depends_on: [s3]
    networks: [app-network]
    restart: "no"
    entrypoint: ["/bin/sh", "-lc"]
    command: >
      until mc alias set local http://s3:9000 ${MINIO_ROOT_USER:-admin} ${MINIO_ROOT_PASSWORD:-supersecretpassword}; do sleep 1; done;
      mc mb -p local/${AWS_BUCKET:-social-network-media} || true;
      mc anonymous set download local/${AWS_BUCKET:-social-network-media} || true;

  mailer:
    profiles: ["mailpit"]
    image: axllent/mailpit
    restart: unless-stopped
    networks: [app-network]


  client:
    profiles: ["tools"]
    image: node:24-alpine
    working_dir: /app
    volumes:
      - ./client:/app
    command: sh -lc "node -v && npm -v"
    ports:
      - "5173:5173"
    networks: [app-network]

volumes:
  postgres_data: {}
  s3_data: {}
  nginx_logs: {}
  symfony_var: {}
  symfony_vendor: {}
  composer_cache: {}

networks:
  app-network:
    driver: bridge
