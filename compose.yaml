services:
  nginx:
    image: nginx:alpine
    depends_on:
      - php
      - mercure
      - s3
    ports:
      - "80:80"
    volumes:
      #  NGINX_MODE=prod|dev
      - ./docker/nginx/nginx.${NGINX_MODE:-prod}.conf:/etc/nginx/nginx.conf:ro

      # Symfony
      - ./server:/var/www/app

      # SPA dist -> /public/spa
      - ./client/dist:/var/www/app/public/spa:ro
      
      # NGINX logs
      - nginx_logs:/var/log/nginx
    networks:
      - app-network

  php:
    build:
      context: ./docker/php
      args:
        INSTALL_XDEBUG: "${INSTALL_XDEBUG:-0}"
    working_dir: /var/www/app
    env_file:
      - ./server/.env
    environment:
      MAILER_DSN: ${MAILER_DSN}
      MAIL_FROM: ${MAIL_FROM:-no-reply@localhost}
    depends_on:
      - postgres
      - mercure
      - s3
      - mailer
    volumes:
      - ./server:/var/www/app
      - ./docker/php/conf/x-php.ini:/usr/local/etc/php/conf.d/custom-docker-php.ini:ro
    networks:
      - app-network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-dev}"
      POSTGRES_USER: "${POSTGRES_USER:-app}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-app}"
    ports:
      - "54328:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - app-network

  mercure:
    image: dunglas/mercure
    restart: unless-stopped
    environment:
      SERVER_NAME: ":80"
      MERCURE_PUBLISHER_JWT_KEY: "!ChangeThisMercureHubJWTSecretKey!"
      MERCURE_SUBSCRIBER_JWT_KEY: "!ChangeThisMercureHubJWTSecretKey!"
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins http://localhost:8098 http://127.0.0.1:8098
    command: /usr/bin/caddy run --config /etc/caddy/dev.Caddyfile
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/healthz"]
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - mercure_data:/data
      - mercure_config:/config
    networks:
      - app-network

  s3:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: "admin"
      MINIO_ROOT_PASSWORD: "supersecretpassword"
      MINIO_SERVER_URL: "http://localhost:9000"
      MINIO_BROWSER_REDIRECT_URL: "http://localhost:9001"
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - s3_data:/data
    networks:
      - app-network

  s3-init:
    image: minio/mc:latest
    depends_on:
      - s3
    environment:
      MINIO_ROOT_USER: "admin"
      MINIO_ROOT_PASSWORD: "supersecretpassword"
      AWS_BUCKET: "social-network-media"
    networks:
      - app-network
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://s3:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do sleep 1; done;
      mc mb -p local/$$AWS_BUCKET || true;
      mc anonymous set download local/$$AWS_BUCKET || true;
      exit 0;
      "

  mailer:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - app-network

  client:
    profiles: ["dev"]
    build:
      context: ./client
      dockerfile: Dockerfile
    working_dir: /app
    command: sh -lc "npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    networks:
      - app-network

volumes:
  postgres_data: {}
  mercure_data: {}
  mercure_config: {}
  s3_data: {}
  nginx_logs: {}
  client_node_modules: {}

networks:
  app-network:
    driver: bridge
