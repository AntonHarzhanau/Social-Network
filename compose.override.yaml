services:
  ###> symfony/mercure-bundle ###
  mercure:
    ports:
      - "3000:80"
  ###< symfony/mercure-bundle ###

  s3:
    ports:
      - "9000:9000" # S3 API endpoint
      - "9001:9001" # Web console (UI)

  ###> symfony/mailer ###
  mailer:
    image: axllent/mailpit
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
###< symfony/mailer ###
